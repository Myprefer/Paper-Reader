<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片管理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #4f8ef7, #7c4dff);
      color: #fff;
      padding: 16px 32px;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 1px;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .icon { font-size: 1.5rem; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 0;
      padding: 24px 32px 0;
      border-bottom: 2px solid #dde2ed;
      background: #f0f2f5;
    }
    .tab-btn {
      padding: 10px 28px;
      font-size: 0.95rem;
      font-weight: 500;
      border: 1px solid #dde2ed;
      border-bottom: none;
      background: #e8ebf2;
      color: #666;
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      margin-right: 4px;
      transition: background .15s, color .15s;
    }
    .tab-btn:hover { background: #d8dceb; color: #333; }
    .tab-btn.active {
      background: #fff;
      color: #4f8ef7;
      font-weight: 600;
      border-color: #dde2ed;
      border-bottom-color: #fff;
      margin-bottom: -2px;
      z-index: 1;
      position: relative;
    }

    /* ── Main panel ── */
    .panel {
      display: none;
      background: #fff;
      margin: 0 32px 32px;
      border: 1px solid #dde2ed;
      border-top: none;
      border-radius: 0 0 12px 12px;
      min-height: 400px;
      padding: 24px;
    }
    .panel.active { display: block; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .toolbar .expand-all, .toolbar .collapse-all {
      padding: 6px 16px;
      font-size: 0.85rem;
      border: 1px solid #c8cfe0;
      border-radius: 6px;
      background: #f5f7fb;
      cursor: pointer;
      transition: background .15s;
    }
    .toolbar .expand-all:hover, .toolbar .collapse-all:hover { background: #e3e8f5; }
    .toolbar .stat { color: #999; font-size: 0.85rem; margin-left: auto; }

    /* ── Loading / Empty ── */
    .loading, .empty {
      text-align: center;
      color: #aaa;
      padding: 60px 20px;
      font-size: 1rem;
    }
    .loading::before { content: "⏳ "; }
    .empty::before { content: "🖼️ "; }

    /* ── Tree ── */
    .tree-root { user-select: none; }

    .tree-node { margin-bottom: 4px; }

    .folder-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 7px;
      cursor: pointer;
      transition: background .12s;
    }
    .folder-header:hover { background: #f0f4ff; }

    .arrow {
      display: inline-block;
      width: 16px;
      font-size: 0.75rem;
      color: #888;
      transition: transform .18s;
      flex-shrink: 0;
    }
    .arrow.open { transform: rotate(90deg); }

    .folder-icon { font-size: 1rem; }
    .folder-name { font-weight: 600; font-size: 0.95rem; color: #344; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .folder-count { font-size: 0.78rem; color: #bbb; flex-shrink: 0; }

    .folder-content { padding-left: 26px; }
    .folder-content.collapsed { display: none; }

    /* ── Image Grid ── */
    .image-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 10px 0 14px;
    }

    .image-card {
      width: 600px;
      flex-shrink: 0;
      background: #fafbfd;
      border: 1px solid #e4e8f0;
      border-radius: 9px;
      overflow: hidden;
      transition: box-shadow .18s, transform .18s;
      cursor: default;
    }
    .image-card:hover {
      box-shadow: 0 6px 20px rgba(79,142,247,.18);
      transform: translateY(-2px);
    }

    .image-thumb-wrap {
      position: relative;
      width: 100%;
      height: 450px;
      background: #eef0f5;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .image-thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity .2s;
    }
    .image-thumb-wrap img.loading-img { opacity: 0; }
    .image-thumb-wrap img.loaded { opacity: 1; }

    /* overlay buttons */
    .img-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.42);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      opacity: 0;
      transition: opacity .18s;
    }
    .image-card:hover .img-overlay { opacity: 1; }

    .img-overlay button {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s, background .15s;
    }
    .img-overlay button:hover { transform: scale(1.12); }
    .btn-download { background: #4f8ef7; color: #fff; }
    .btn-delete   { background: #f55; color: #fff; }
    .btn-preview  { background: #fff; color: #333; }

    .image-name {
      padding: 6px 8px;
      font-size: 0.75rem;
      color: #555;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
    }
    .image-size {
      font-size: 0.7rem;
      color: #bbb;
      text-align: center;
      padding-bottom: 6px;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.82);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw;
      max-height: 84vh;
      border-radius: 6px;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }
    #lightbox .lb-name {
      color: #eee;
      margin-top: 14px;
      font-size: 0.9rem;
      max-width: 92vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #lightbox .lb-close {
      position: absolute;
      top: 20px;
      right: 28px;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px 10px;
      border-radius: 6px;
      transition: background .15s;
    }
    #lightbox .lb-close:hover { background: rgba(255,255,255,.15); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #323232;
      color: #fff;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      opacity: 0;
      transition: transform .3s, opacity .3s;
      z-index: 10000;
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success { background: #00b96b; }
    #toast.error   { background: #e53935; }

    /* ── Confirm Dialog ── */
    #confirm-dialog {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 9998;
      align-items: center;
      justify-content: center;
    }
    #confirm-dialog.open { display: flex; }
    .confirm-box {
      background: #fff;
      border-radius: 12px;
      padding: 28px 32px;
      min-width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      text-align: center;
    }
    .confirm-box h3 { font-size: 1rem; margin-bottom: 10px; }
    .confirm-box p  { color: #666; font-size: 0.88rem; margin-bottom: 22px; word-break: break-all; }
    .confirm-actions { display: flex; gap: 12px; justify-content: center; }
    .confirm-actions button {
      padding: 8px 26px;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity .15s;
    }
    .confirm-actions button:hover { opacity: .85; }
    .btn-cancel { background: #eee; color: #444; }
    .btn-confirm-del { background: #f55; color: #fff; }

    @media (max-width: 600px) {
      .tabs { padding: 16px 12px 0; }
      .panel { margin: 0 8px 16px; padding: 14px; }
      .image-card { width: 160px; }
      .image-thumb-wrap { height: 124px; }
    }
  </style>
</head>
<body>

<header>
  <span class="icon">🖼️</span>
  图片管理
</header>

<!-- ── Tabs ── -->
<div class="tabs">
  <button class="tab-btn active" data-gallery="images" onclick="switchTab('images')">📂 images</button>
  <button class="tab-btn" data-gallery="images_zh" onclick="switchTab('images_zh')">📂 images_zh</button>
</div>

<!-- ── Panels ── -->
<div id="panel-images" class="panel active">
  <div class="toolbar">
    <button class="expand-all"   onclick="expandAll('images')">全部展开</button>
    <button class="collapse-all" onclick="collapseAll('images')">全部折叠</button>
    <span class="stat" id="stat-images"></span>
  </div>
  <div id="tree-images" class="tree-root"><div class="loading">加载中...</div></div>
</div>

<div id="panel-images_zh" class="panel">
  <div class="toolbar">
    <button class="expand-all"   onclick="expandAll('images_zh')">全部展开</button>
    <button class="collapse-all" onclick="collapseAll('images_zh')">全部折叠</button>
    <span class="stat" id="stat-images_zh"></span>
  </div>
  <div id="tree-images_zh" class="tree-root"><div class="loading">加载中...</div></div>
</div>

<!-- ── Lightbox ── -->
<div id="lightbox" onclick="closeLightbox()">
  <span class="lb-close" onclick="closeLightbox()">✕</span>
  <img id="lb-img" src="" alt="" onclick="event.stopPropagation()" />
  <div class="lb-name" id="lb-name"></div>
</div>

<!-- ── Confirm Dialog ── -->
<div id="confirm-dialog">
  <div class="confirm-box">
    <h3>确认删除</h3>
    <p id="confirm-text"></p>
    <div class="confirm-actions">
      <button class="btn-cancel"      onclick="closeConfirm()">取消</button>
      <button class="btn-confirm-del" id="confirm-ok">删除</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
const galleries = ['images', 'images_zh'];
const treeData = {};     // gallery -> tree JSON
const loaded = {};       // gallery -> bool

// ─────────────────────────────────────────────
// Tab switching
// ─────────────────────────────────────────────
function switchTab(gallery) {
  galleries.forEach(g => {
    document.querySelector(`.tab-btn[data-gallery="${g}"]`).classList.toggle('active', g === gallery);
    document.getElementById(`panel-${g}`).classList.toggle('active', g === gallery);
  });
  if (!loaded[gallery]) loadGallery(gallery);
}

// ─────────────────────────────────────────────
// Load gallery tree
// ─────────────────────────────────────────────
async function loadGallery(gallery) {
  loaded[gallery] = true;
  const container = document.getElementById(`tree-${gallery}`);
  container.innerHTML = '<div class="loading">加载中...</div>';
  try {
    const res = await fetch(`/api/tree/${gallery}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const tree = await res.json();
    treeData[gallery] = tree;
    const stats = countStats(tree);
    document.getElementById(`stat-${gallery}`).textContent =
      `共 ${stats.dirs} 个目录，${stats.imgs} 张图片`;
    container.innerHTML = '';
    if (stats.imgs === 0) {
      container.innerHTML = '<div class="empty">暂无图片</div>';
    } else {
      const el = renderNode(tree, gallery, 0);
      container.appendChild(el);
    }
  } catch (e) {
    container.innerHTML = `<div class="empty">加载失败：${e.message}</div>`;
  }
}

function countStats(node) {
  let dirs = 0, imgs = 0;
  for (const child of node.children || []) {
    if (child.type === 'dir') { dirs++; const s = countStats(child); dirs += s.dirs; imgs += s.imgs; }
    else imgs++;
  }
  return { dirs, imgs };
}

// ─────────────────────────────────────────────
// Render tree node (recursive)
// ─────────────────────────────────────────────
function renderNode(node, gallery, depth) {
  const wrapper = document.createElement('div');
  wrapper.className = 'tree-node';
  wrapper.dataset.gallery = gallery;

  // Folder header
  const header = document.createElement('div');
  header.className = 'folder-header';
  header.innerHTML = `
    <span class="arrow open">▶</span>
    <span class="folder-icon">${depth === 0 ? '🗂️' : '📁'}</span>
    <span class="folder-name" title="${node.name}">${escHtml(node.name)}</span>
    <span class="folder-count">${childSummary(node)}</span>
  `;
  wrapper.appendChild(header);

  // Folder content
  const content = document.createElement('div');
  content.className = 'folder-content';   // default open
  wrapper.appendChild(content);

  // Toggle
  header.addEventListener('click', () => {
    const arrow = header.querySelector('.arrow');
    const isOpen = !content.classList.contains('collapsed');
    content.classList.toggle('collapsed', isOpen);
    arrow.classList.toggle('open', !isOpen);
  });

  // Sub-directories first, then images
  const dirs = (node.children || []).filter(c => c.type === 'dir');
  const imgs  = (node.children || []).filter(c => c.type === 'file');

  dirs.forEach(d => content.appendChild(renderNode(d, gallery, depth + 1)));

  if (imgs.length > 0) {
    const grid = document.createElement('div');
    grid.className = 'image-grid';
    imgs.forEach(img => grid.appendChild(renderImageCard(img, gallery)));
    content.appendChild(grid);
  }

  return wrapper;
}

function childSummary(node) {
  const dirs = (node.children || []).filter(c => c.type === 'dir').length;
  const imgs  = (node.children || []).filter(c => c.type === 'file').length;
  const parts = [];
  if (dirs) parts.push(`${dirs} 目录`);
  if (imgs) parts.push(`${imgs} 图`);
  return parts.join('，');
}

// ─────────────────────────────────────────────
// Render image card
// ─────────────────────────────────────────────
function renderImageCard(imgNode, gallery) {
  const card = document.createElement('div');
  card.className = 'image-card';
  card.dataset.path = imgNode.path;
  card.dataset.gallery = gallery;

  const thumbUrl = `/img/${gallery}/${imgNode.path}`;
  const sizeStr  = formatSize(imgNode.size);

  card.innerHTML = `
    <div class="image-thumb-wrap">
      <img class="loading-img" src="${thumbUrl}" alt="${escHtml(imgNode.name)}" loading="lazy" />
      <div class="img-overlay">
        <button class="btn-preview"  title="预览" onclick="previewImg('${escAttr(thumbUrl)}','${escAttr(imgNode.name)}')">🔍</button>
        <button class="btn-download" title="下载" onclick="downloadImg('${escAttr(gallery)}','${escAttr(imgNode.path)}')">⬇</button>
        <button class="btn-delete"   title="删除" onclick="confirmDelete('${escAttr(gallery)}','${escAttr(imgNode.path)}')">🗑</button>
      </div>
    </div>
    <div class="image-name" title="${escHtml(imgNode.name)}">${escHtml(imgNode.name)}</div>
    <div class="image-size">${sizeStr}</div>
  `;

  // lazy load fade-in
  const img = card.querySelector('img');
  img.addEventListener('load',  () => { img.classList.remove('loading-img'); img.classList.add('loaded'); });
  img.addEventListener('error', () => { img.src = ''; img.parentElement.innerHTML = '<div style="color:#ccc;font-size:2rem;text-align:center;padding:28px;">❌</div>'; });

  return card;
}

// ─────────────────────────────────────────────
// Expand / Collapse all
// ─────────────────────────────────────────────
function expandAll(gallery) {
  document.querySelectorAll(`#panel-${gallery} .folder-content`).forEach(el => {
    el.classList.remove('collapsed');
    el.closest('.tree-node')?.querySelector('.arrow')?.classList.add('open');
  });
}

function collapseAll(gallery) {
  document.querySelectorAll(`#panel-${gallery} .folder-content`).forEach(el => {
    el.classList.add('collapsed');
    el.closest('.tree-node')?.querySelector('.arrow')?.classList.remove('open');
  });
}

// ─────────────────────────────────────────────
// Preview (Lightbox)
// ─────────────────────────────────────────────
function previewImg(url, name) {
  document.getElementById('lb-img').src = url;
  document.getElementById('lb-name').textContent = name;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-img').src = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLightbox(); closeConfirm(); }
});

// ─────────────────────────────────────────────
// Download
// ─────────────────────────────────────────────
function downloadImg(gallery, path) {
  const a = document.createElement('a');
  a.href = `/download/${gallery}/${path}`;
  a.download = '';
  a.click();
}

// ─────────────────────────────────────────────
// Delete
// ─────────────────────────────────────────────
let pendingDelete = null;

function confirmDelete(gallery, path) {
  pendingDelete = { gallery, path };
  document.getElementById('confirm-text').textContent = path;
  document.getElementById('confirm-dialog').classList.add('open');
  document.getElementById('confirm-ok').onclick = doDelete;
}

function closeConfirm() {
  document.getElementById('confirm-dialog').classList.remove('open');
  pendingDelete = null;
}

async function doDelete() {
  if (!pendingDelete) return;
  const { gallery, path } = pendingDelete;
  closeConfirm();
  try {
    const res = await fetch(`/delete/${gallery}/${path}`, { method: 'DELETE' });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || `HTTP ${res.status}`);
    }
    showToast('删除成功', 'success');
    // Remove the card from DOM
    const card = document.querySelector(`.image-card[data-path="${CSS.escape(path)}"][data-gallery="${gallery}"]`);
    if (card) {
      const grid = card.parentElement;
      card.remove();
      // Clean up empty grid / node
      if (grid && grid.querySelectorAll('.image-card').length === 0) {
        // update parent folder count
        updateFolderCount(grid.closest('.tree-node'));
        grid.remove();
      }
    }
    // Refresh stats
    reloadStats(gallery);
  } catch (e) {
    showToast('删除失败：' + e.message, 'error');
  }
}

function updateFolderCount(treeNode) {
  if (!treeNode) return;
  const fc = treeNode.querySelector('.folder-content');
  if (!fc) return;
  const dirs = fc.querySelectorAll(':scope > .tree-node').length;
  const imgs  = fc.querySelectorAll(':scope > .image-grid > .image-card').length;
  const span = treeNode.querySelector('.folder-header .folder-count');
  if (!span) return;
  const parts = [];
  if (dirs) parts.push(`${dirs} 目录`);
  if (imgs) parts.push(`${imgs} 图`);
  span.textContent = parts.join('，');
}

function reloadStats(gallery) {
  const panel = document.getElementById(`panel-${gallery}`);
  const allCards = panel.querySelectorAll('.image-card').length;
  const allDirs  = panel.querySelectorAll('.tree-node').length;
  document.getElementById(`stat-${gallery}`).textContent =
    `共 ${allDirs} 个目录，${allCards} 张图片`;
}

// ─────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 2800);
}

// ─────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/'/g,"\\'").replace(/\\/g,'\\\\');
}
function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
loadGallery('images');
</script>
</body>
</html>
